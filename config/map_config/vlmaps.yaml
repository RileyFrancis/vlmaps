map_type: "vlmap" # "vlmap", "gt", "clip", "clip_gradcam", "vlmaps_lseg_3d"
pose_info:
  pose_type: mobile_base
  rot_type: "quat"
  camera_height: 0.45        # height of Go2's front camera from floor - measure this!
  base2cam_rot: [0, -1, 0, 0, 0, -1, 1, 0, 0]   # standard ROS cam orientation
  base_forward_axis: [1, 0, 0]
  base_left_axis: [0, 1, 0]
  base_up_axis: [0, 0, 1]

skip_frame: 1

# Your actual Go2 camera intrinsics from camera_info
cam_calib_mat: [864.39938, 0.0, 639.19798, 0.0, 863.73849, 373.28118, 0.0, 0.0, 1.0]
grid_size: ${params.gs}
cell_size: ${params.cs}
depth_sample_rate: 100
dilate_iter: 3
gaussian_sigma: 1.0
customize_obstacle_map: False
potential_obstacle_names:
  - "chair"
  - "wall"
  - "wall above the door"
  - "table"
  - "window"
  - "floor"
  - "stairs"
  - "other"
obstacle_names:
  - "wall"
  - "chair"
  - "table"
  - "window"
  - "stairs"
  - "other"
categories: "mp3d" # "mp3d", "ai2thor"
